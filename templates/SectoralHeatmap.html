<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sectoral Heatmap - NSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #111827; color: white; }
        .sector-box { background-color: #1f2937; border-radius: 8px; padding: 1rem; border: 1px solid #374151; transition: transform 0.2s; }
        .sector-box:hover { transform: scale(1.01); }
        .sector-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 4px; }
        .cell { position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2px; border-radius: 4px; cursor: pointer; text-align: center; height: 45px; transition: transform 0.2s, background-color 0.2s; border: 1px solid #374151; }
        .cell:hover { transform: scale(1.1); z-index: 10; border-color: #9ca3af; }
        .stock-ticker { font-weight: 700; font-size: 9px; }
        .stock-change { font-size: 7px; opacity: 0.9; }
        .status-badge { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; border-radius: 50%; border: 1px solid white; }
        .status-fired { background-color: #f59e0b; box-shadow: 0 0 5px #f59e0b; }
        .status-squeeze { background-color: #3b82f6; }
        .tooltip { position: absolute; text-align: center; padding: 8px; font: 12px sans-serif; background: #1f2937; border: 1px solid #4b5563; border-radius: 8px; pointer-events: none; opacity: 0; color: white; z-index: 50; }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
    </style>
</head>
<body class="bg-gray-900">
    <div class="container mx-auto p-4 md:p-6">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl md:text-3xl font-bold">Sectoral Heatmap (NSE)</h1>
            <div class="flex space-x-4">
                <a href="/" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-md transition">Dashboard</a>
                <button id="refresh-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition">Refresh</button>
            </div>
        </header>

        <div id="status-legend" class="flex space-x-6 mb-6 text-sm bg-gray-800 p-3 rounded-lg border border-gray-700">
            <div class="flex items-center"><div class="w-3 h-3 rounded-full status-fired mr-2"></div> Squeeze Fired</div>
            <div class="flex items-center"><div class="w-3 h-3 rounded-full status-squeeze mr-2"></div> In Squeeze</div>
            <div class="flex items-center"><div class="w-8 h-3 bg-green-600 mr-2 rounded"></div> Positive Sector</div>
            <div class="flex items-center"><div class="w-8 h-3 bg-red-600 mr-2 rounded"></div> Negative Sector</div>
        </div>

        <div id="sectors-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Sectors will be inserted here -->
        </div>

        <div class="tooltip"></div>
    </div>

    <script>
        const sectorsGrid = d3.select("#sectors-grid");
        const tooltip = d3.select(".tooltip");
        const refreshBtn = document.getElementById('refresh-btn');

        // Color Scales
        const sectorColor = d3.scaleLinear().domain([-3, 0, 3]).range(["#7f1d1d", "#374151", "#064e3b"]).clamp(true);
        const stockColor = d3.scaleLinear().domain([-5, 0, 5]).range(["#ef4444", "#374151", "#10b981"]).clamp(true);

        async function fetchData() {
            try {
                const response = await fetch('/get_sector_summary');
                const data = await response.json();
                renderHeatmap(data);
            } catch (error) {
                console.error("Error fetching sectoral data:", error);
            }
        }

        function renderHeatmap(data) {
            sectorsGrid.html("");

            // Sort sectors by performance
            const sortedSectors = data.sectors.sort((a, b) => b.avg_change - a.avg_change);

            sortedSectors.forEach(sector => {
                const sectorStocks = data.stocks.filter(s => s.sector === sector.sector);

                const box = sectorsGrid.append("div")
                    .attr("class", "sector-box")
                    .style("border-top", `4px solid ${sectorColor(sector.avg_change)}`);

                const title = box.append("div").attr("class", "sector-title");
                title.append("span").text(sector.sector);
                title.append("span")
                    .attr("class", sector.avg_change >= 0 ? "positive" : "negative")
                    .text(`${sector.avg_change.toFixed(2)}%`);

                if (sectorStocks.length === 0) {
                    box.append("p").attr("class", "text-gray-500 text-xs italic").text("No active squeezes");
                    return;
                }

                const grid = box.append("div").attr("class", "grid-container");

                sectorStocks.forEach(stock => {
                    const cell = grid.append("div")
                        .attr("class", "cell")
                        .style("background-color", stockColor(stock.change))
                        .on("click", () => window.open(stock.url, "_blank"))
                        .on("mouseover", (event) => {
                            tooltip.transition().duration(200).style("opacity", .9);
                            tooltip.html(`
                                <strong>${stock.name.replace('NSE:', '')}</strong><br/>
                                Sector: ${stock.sector}<br/>
                                Change: <span class="${stock.change >= 0 ? 'positive' : 'negative'}">${stock.change.toFixed(2)}%</span><br/>
                                Status: ${stock.status === 'fired' ? 'Fired' : 'In Squeeze'} (${stock.highest_tf})<br/>
                                RVOL: ${stock.rvol.toFixed(2)}
                            `).style("left", (event.pageX + 10) + "px").style("top", (event.pageY - 28) + "px");
                        })
                        .on("mouseout", () => tooltip.transition().duration(500).style("opacity", 0));

                    if (stock.status === 'fired') {
                        cell.append("div").attr("class", "status-badge status-fired");
                    } else if (stock.status === 'in_squeeze') {
                        cell.append("div").attr("class", "status-badge status-squeeze");
                    }

                    cell.append("div").attr("class", "stock-ticker").text(stock.name.replace('NSE:', ''));
                    cell.append("div").attr("class", "stock-change").text(`${stock.change.toFixed(1)}%`);
                });
            });
        }

        refreshBtn.addEventListener('click', fetchData);
        fetchData();
        setInterval(fetchData, 30000); // Auto-refresh every 30 seconds
    </script>
</body>
</html>
